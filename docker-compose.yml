version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5001:5001"
    volumes:
      - sqlite_data:/app/server  # Persistent SQLite database
    environment:
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-super-secret-key}
      - FLASK_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
